  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --gold: #E8A020;
      --gold-light: #F5C842;
      --gold-pale: #FDF3D0;
      --terra: #C4622D;
      --terra-light: #E8855A;
      --terra-pale: #FDE8D8;
      --sage: #5A7A4A;
      --sage-light: #7AA05A;
      --sage-pale: #E8F0E0;
      --teal: #2A7A6A;
      --teal-pale: #D8F0E8;
      --cream: #FDFAF2;
      --parchment: #F5EED8;
      --warm-white: #FFFEF8;
      --ink: #1A1208;
      --ink-mid: #3D2E12;
      --ink-soft: #6B5530;
      --ink-muted: #9A8060;
      --border: #E8D8B8;
      --border-soft: #F0E4C8;
      --shadow-warm: rgba(200, 140, 40, 0.12);
      --radius: 16px;
      --radius-sm: 10px;
      --radius-lg: 24px;
      --tab-h: 68px;
    }

    html, body { height: 100%; background: var(--cream); }
    body {
      font-family: 'DM Sans', system-ui, sans-serif;
      color: var(--ink);
      overflow: hidden;
      height: 100dvh;
    }
    #root { height: 100dvh; display: flex; flex-direction: column; }

    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    @keyframes scaleIn {
      from { opacity: 0; transform: scale(0.94) translateY(20px); }
      to { opacity: 1; transform: scale(1) translateY(0); }
    }
    @keyframes checkDraw {
      from { stroke-dashoffset: 100; opacity: 0; }
      to { stroke-dashoffset: 0; opacity: 1; }
    }
    @keyframes particleBurst {
      0% { transform: translate(-50%, -50%) scale(0); opacity: 1; }
      100% { transform: translate(calc(-50% + var(--tx)), calc(-50% + var(--ty))) scale(1); opacity: 0; }
    }
    @keyframes pulseGold {
      0% { box-shadow: 0 0 0 0 rgba(232, 160, 32, 0.5); }
      70% { box-shadow: 0 0 0 10px rgba(232, 160, 32, 0); }
      100% { box-shadow: 0 0 0 0 rgba(232, 160, 32, 0); }
    }
    @keyframes bloomIn {
      0% { transform: scale(0.6) rotate(-20deg); opacity: 0; }
      65% { transform: scale(1.08) rotate(3deg); opacity: 1; }
      100% { transform: scale(1) rotate(0deg); opacity: 1; }
    }
    @keyframes slideUp {
      from { transform: translateY(100%); }
      to { transform: translateY(0); }
    }
    @keyframes rollNumber {
      from { transform: translateY(12px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }

    .font-display { font-family: 'Playfair Display', Georgia, serif; }
    .screen {
      flex: 1; overflow-y: auto; overflow-x: hidden;
      padding-bottom: calc(var(--tab-h) + 12px);
      -webkit-overflow-scrolling: touch;
    }
    .tab-bar {
      height: var(--tab-h);
      background: rgba(255, 254, 248, 0.96);
      border-top: 1.5px solid var(--border);
      display: flex; align-items: center; padding: 0 8px;
      flex-shrink: 0;
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
    }
    .tab-btn {
      flex: 1; display: flex; flex-direction: column; align-items: center; gap: 3px;
      padding: 8px 4px; border: none; background: none; cursor: pointer;
      color: var(--ink-muted); font-family: 'DM Sans', sans-serif;
      font-size: 10.5px; font-weight: 500; letter-spacing: 0.01em;
      border-radius: var(--radius-sm);
      transition: color 0.2s, background 0.2s;
      -webkit-tap-highlight-color: transparent;
    }
    .tab-btn.active { color: var(--terra); }
    .tab-icon {
      width: 30px; height: 30px; display: flex; align-items: center; justify-content: center;
      border-radius: 9px; font-size: 17px;
      transition: background 0.2s, transform 0.2s;
    }
    .tab-btn.active .tab-icon { background: var(--terra-pale); transform: scale(1.05); }

    .card {
      background: var(--warm-white);
      border: 1.5px solid var(--border-soft);
      border-radius: var(--radius); overflow: hidden;
      transition: transform 0.2s, box-shadow 0.2s;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }
    .card:active { transform: scale(0.985); }

    .fab {
      display: flex; align-items: center; justify-content: center; gap: 8px;
      padding: 14px 24px; border: none; border-radius: 50px;
      font-family: 'DM Sans', sans-serif; font-size: 15px; font-weight: 600;
      cursor: pointer; transition: transform 0.2s, box-shadow 0.2s;
      -webkit-tap-highlight-color: transparent; width: 100%;
    }
    .fab:active { transform: scale(0.97); }
    .fab-primary {
      background: linear-gradient(135deg, var(--terra) 0%, var(--terra-light) 100%);
      color: white; box-shadow: 0 4px 16px rgba(196, 98, 45, 0.35);
    }
    .fab-secondary {
      background: var(--sage-pale); color: var(--sage);
      border: 1.5px solid var(--sage-light);
    }
    .fab-ghost {
      background: none; color: var(--ink-soft);
      border: 1.5px solid var(--border);
    }

    .search-input {
      width: 100%; padding: 11px 16px 11px 42px;
      border: 1.5px solid var(--border); border-radius: 12px;
      background: var(--warm-white); font-family: 'DM Sans', sans-serif;
      font-size: 14px; color: var(--ink); outline: none;
      transition: border-color 0.2s;
    }
    .search-input:focus { border-color: var(--gold); }
    .search-input::placeholder { color: var(--ink-muted); }

    .category-pill {
      display: inline-flex; align-items: center; gap: 5px;
      padding: 3px 9px; border-radius: 20px;
      font-size: 10.5px; font-weight: 700; letter-spacing: 0.04em; text-transform: uppercase;
    }

    .checklist-item {
      display: flex; align-items: center; gap: 14px;
      padding: 14px 16px;
      background: var(--warm-white); border: 1.5px solid var(--border-soft);
      border-radius: 12px; cursor: pointer;
      transition: background 0.25s, border-color 0.25s, transform 0.15s;
      -webkit-tap-highlight-color: transparent; user-select: none;
    }
    .checklist-item:active { transform: scale(0.985); }
    .checklist-item.completed { background: var(--sage-pale); border-color: var(--sage-light); }

    .check-circle {
      width: 30px; height: 30px; flex-shrink: 0; border-radius: 50%;
      border: 2.5px solid var(--border);
      display: flex; align-items: center; justify-content: center;
      transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
      position: relative; overflow: visible;
      background: white;
    }
    .check-circle.done {
      border-color: var(--sage); background: var(--sage);
      animation: pulseGold 0.5s ease;
    }

    .streak-bg {
      background: linear-gradient(135deg, var(--terra) 0%, var(--gold) 100%);
      border-radius: var(--radius); position: relative; overflow: hidden;
    }
    .geo-bg {
      position: absolute; inset: 0; opacity: 0.07;
      background-image: url("data:image/svg+xml,%3Csvg width='80' height='80' viewBox='0 0 80 80' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='white'%3E%3Cpolygon points='40,5 65,20 75,47 60,72 20,72 5,47 15,20' opacity='0.5'/%3E%3Cpolygon points='40,15 58,26 65,47 55,65 25,65 15,47 22,26' opacity='0.3'/%3E%3C/g%3E%3C/svg%3E");
      pointer-events: none;
    }

    .detail-overlay {
      position: fixed; inset: 0; background: rgba(8, 4, 0, 0.55); z-index: 100;
      backdrop-filter: blur(6px); -webkit-backdrop-filter: blur(6px);
      animation: fadeIn 0.2s ease;
    }
    .detail-sheet {
      position: fixed; bottom: 0; left: 0; right: 0;
      background: var(--cream); border-radius: 26px 26px 0 0;
      max-height: 93dvh; overflow-y: auto; z-index: 101;
      animation: slideUp 0.35s cubic-bezier(0.32, 0.72, 0, 1);
      padding-bottom: max(env(safe-area-inset-bottom, 0px), 20px);
      box-shadow: 0 -8px 40px rgba(20, 10, 0, 0.2);
    }
    .sheet-handle {
      width: 42px; height: 4.5px; background: var(--border);
      border-radius: 3px; margin: 14px auto 0;
    }

    .onboard-screen {
      position: fixed; inset: 0; background: var(--cream); z-index: 200;
      display: flex; flex-direction: column; animation: fadeIn 0.4s ease;
    }

    .milestone-item {
      display: flex; align-items: center; gap: 14px;
      padding: 14px 16px; border-radius: 12px;
      border: 1.5px solid var(--border-soft);
      background: var(--warm-white);
      transition: background 0.2s;
    }
    .milestone-item.reached {
      background: var(--sage-pale); border-color: var(--sage-light);
    }

    .anim-fade-up { animation: fadeUp 0.45s ease both; }
    .anim-scale-in { animation: scaleIn 0.4s ease both; }
    .anim-bloom { animation: bloomIn 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) both; }
  </style>
</head>

<script type="text/babel">
const { useState, useEffect, useCallback, useRef } = React;

// ── DATA ──────────────────────────────────────────────────────────────────────
const HABITS = [
  {
    id:"1", title:"The Intentional Sleep", category:"Personal Habits & The Home", categorySlug:"personal",
    emoji:"🌙", shortDesc:"He approached sleep with profound intentionality — not as an unconscious collapse, but as a deliberate act of surrender.",
    story:"Rather than yielding to sleep as an unconscious collapse, the Prophet ﷺ approached it with profound intentionality. He rested on a humble leather mattress stuffed with coarse palm fibers, categorically rejecting the luxurious silk bedding typical of Byzantine monarchs. In preparation for sleep, he performed Wudu (ritual ablution), ensuring he ended his day in a state of physical and spiritual purity. He then laid on his right side, placing his right hand gently beneath his right cheek — a posture that modern somnology increasingly acknowledges for its physiological benefits regarding cardiac and digestive function. As he settled, he would utter: \"Allahumma bismika amutu wa ahya\" (O Allah, in Your name I die and I live).",
    modernApplication:"Create a deliberate 'digital sunset' 30 minutes before bed. Put the phone face-down, perform wudu or wash your face, and lie on your right side. Replace the doom-scroll with a short du'a or reflection. This single transition ritual signals to your nervous system that the day is truly done.",
    citation:"Sahih al-Bukhari, Hadith 247; Ibn al-Qayyim, Zad al-Ma'ad", sunnahLink:"https://sunnah.com/bukhari:247",
    tags:["sleep","routine","night","purification"]
  },
  {
    id:"2", title:"Waking to Wonder", category:"Personal Habits & The Home", categorySlug:"personal",
    emoji:"🌅", shortDesc:"His first waking act was to anchor his consciousness in divine majesty — looking to the sky and reciting verses about creation.",
    story:"His transition from sleep to wakefulness was equally deliberate. Upon waking in the pre-dawn stillness, he would sit up and physically wipe the remnants of sleep from his face with his hands. He would then turn his gaze toward the sky, immediately grounding his consciousness in the cosmos by reciting the final ten verses of Surah Aal-Imran (Quran 3:190-200), which reflect on the creation of the heavens and the earth. His first spoken words were an articulation of profound gratitude: \"Al-hamdu Lillah alladhi ahyana ba'd ma amatana wa ilayhi Al-nushur\" (All praise is for Allah who gave us life after having taken it from us).",
    modernApplication:"Before checking your phone, sit up slowly and look out a window or toward the sky. Take three conscious breaths. Let your first thought be gratitude for being alive. This 60-second 'wonder ritual' rewires the brain's default morning response away from anxiety and toward presence.",
    citation:"Sahih al-Bukhari, Hadith 183; Quran 3:190-200", sunnahLink:"https://sunnah.com/bukhari:183",
    tags:["morning","gratitude","mindfulness","dhikr"]
  },
  {
    id:"3", title:"The Miswak Threshold", category:"Personal Habits & The Home", categorySlug:"personal",
    emoji:"🏠", shortDesc:"The moment he crossed the threshold of his home, his very first action was to cleanse his mouth — a psychological transition ritual.",
    story:"Upon crossing the threshold of his home, the Prophet's ﷺ very first action was to use the Miswak. Aisha reported that whenever he entered his house, he would immediately cleanse his mouth. This served as a psychological mechanism to transition from the dusty, demanding public sphere into the sanctity of the home, ensuring he greeted his family in the most pleasant and refined state possible. He also applied fragrant oils (Attar), specifically favoring the scents of musk, oud, and amber, stating that pleasant fragrance is from the ways of the Prophets.",
    modernApplication:"Establish a 'decompression threshold' habit the moment you walk through your front door: change clothes, freshen up, and consciously set down the stress of the workday. This physical ritual signals to your family — and your own nervous system — that you have fully arrived home. You are no longer an employee; you are a spouse, parent, and human being.",
    citation:"Sahih Muslim, Hadith 253; Musnad Ahmad 26194", sunnahLink:"https://sunnah.com/muslim:253",
    tags:["home","family","hygiene","transition","presence"]
  },
  {
    id:"4", title:"The Serving Leader", category:"Personal Habits & The Home", categorySlug:"personal",
    emoji:"🧵", shortDesc:"He mended his own clothes, milked the sheep, and served himself — the leader of a nation doing household chores without a second thought.",
    story:"When asked what the Prophet ﷺ did when he was alone with his family, Aisha summarized with striking clarity: \"He was a human being like any other; he would clean his garment, milk his sheep, and serve himself.\" He did not view household chores as beneath his prophetic dignity. Narrations confirm he would stitch his own garments, mend his own leather shoes, repair his water bucket, and busy himself in the service of his family right up until the call to prayer was made — demonstrating a seamless transition between menial household labor and leading a nation in divine worship.",
    modernApplication:"No matter your corporate rank or community status, engage in mundane household chores — washing dishes, folding laundry, preparing a meal — without viewing these tasks as beneath you. The dissolution of ego-driven domestic hierarchy is one of the most powerful acts of love you can perform for your family.",
    citation:"Musnad Ahmad, Hadith 26194; Sahih al-Bukhari, Hadith 676", sunnahLink:"https://sunnah.com/bukhari:676",
    tags:["home","humility","service","family","household"]
  },
  {
    id:"5", title:"Grace at the Table", category:"Personal Habits & The Home", categorySlug:"personal",
    emoji:"🍽️", shortDesc:"He never criticized any food placed before him. If he liked it, he ate. If not, he left it without a word of complaint.",
    story:"Abu Huraira meticulously documented: \"The Prophet ﷺ never criticized any food presented to him. If he liked it, he would eat it; otherwise, he would leave it without expressing his dislike.\" If a meal was delayed or completely absent, he exhibited no frustration. On days when he found no food prepared in the house, he would calmly declare, 'Then, I am fasting,' transforming a moment of domestic scarcity into an act of voluntary worship. Furthermore, meals were not consumed in silence; he engaged in pleasant conversation, famously praising simple foods such as vinegar.",
    modernApplication:"Practice a zero-complaint policy at the dinner table. If a meal isn't to your taste, eat what you can and say nothing — or find one genuine thing to appreciate about it. This single habit creates an atmosphere of psychological safety where family members feel their efforts are seen and valued.",
    citation:"Sahih al-Bukhari, Hadith 5409; Sahih Muslim, Hadith 2064", sunnahLink:"https://sunnah.com/bukhari:5409",
    tags:["food","gratitude","home","manners","patience"]
  },
  {
    id:"6", title:"Romantic Micro-Gestures", category:"Interpersonal Relationships", categorySlug:"relationships",
    emoji:"💛", shortDesc:"He would find the exact spot where Aisha's lips touched a vessel, and place his own lips there. Small acts of intentional love.",
    story:"The romantic disposition of the Prophet ﷺ was marked by profound tenderness and intentional micro-gestures. He would wait for Aisha to drink from a vessel, locate the exact spot where her lips had touched the rim, and place his own lips on that very spot to drink. He extended this same shared affection to eating, intentionally biting from the exact area of a bone after she had eaten from it. He used endearing nicknames — affectionately calling Aisha \"Humaira\" (the rosy-cheeked one) — and he famously raced her in the desert, losing in their youth and winning years later, playfully remarking: \"This is for that.\"",
    modernApplication:"Revive the art of intentional micro-romance. It's not grand gestures — it's remembering how your spouse takes their coffee, sitting on their side of the couch, texting a memory mid-day. These small, deliberate acts of attunement communicate: 'I see you. I choose you. Every day.'",
    citation:"Sunan Abi Dawud, Hadith 19; Ash-Shamail Al-Muhammadiyyah", sunnahLink:"https://sunnah.com/abudawud:19",
    tags:["marriage","love","romance","spouse","intimacy"]
  },
  {
    id:"7", title:"De-escalating with Grace", category:"Interpersonal Relationships", categorySlug:"relationships",
    emoji:"🕊️", shortDesc:"When Aisha broke a dish in jealousy before guests, he smiled, got on his knees, and quietly cleaned it up.",
    story:"During a gathering, another wife sent a beautifully prepared dish to the Prophet ﷺ and his guests. Overcome with jealousy, Aisha struck the servant's hand, shattering the plate. Instead of exploding in anger at this public display, the Prophet ﷺ simply smiled, got down on his knees, and began gathering the broken pieces and food, telling his guests: \"Your mother became jealous. Eat.\" He then quietly replaced the broken plate from Aisha's house — resolving the incident with immaculate justice and profound psychological grace.",
    modernApplication:"When a domestic dispute escalates in front of others, resist the urge to 'win.' Choose to de-escalate publicly and address privately. Clean up a mess, literally or figuratively, without announcing your sacrifice. The absence of retaliation in a moment of embarrassment is one of the highest forms of marital maturity.",
    citation:"Sunan an-Nasa'i, Hadith 3408; Ash-Shamail Al-Muhammadiyyah", sunnahLink:"https://sunnah.com/nasai:3408",
    tags:["marriage","conflict","patience","de-escalation","emotional-intelligence"]
  },
  {
    id:"8", title:"Greeting the Children First", category:"Interpersonal Relationships", categorySlug:"relationships",
    emoji:"🐦", shortDesc:"He would walk through Medina's streets and initiate the greeting of peace with the children playing.",
    story:"In 7th-century Arabia, children were frequently marginalized. The Prophet ﷺ systematically dismantled this through his public behavior. He was known to walk through the streets of Medina, actively seek out children playing, and initiate the greeting of Salaam with them, validating their existence in the public sphere. When he noticed a young boy, Abu Umair, grieving over the death of his pet bird (Nughayr), he stopped to console him, playfully rhyming: \"O Abu Umair, what did the Nughayr do?\" — prioritizing one child's emotional pain over his own schedule.",
    modernApplication:"When you encounter a child, get down to their level and greet them first. Ask about something specific to their world: a toy, a friend, a show they like. This single act communicates to a child that they are significant, seen, and valued in the adult world.",
    citation:"Sunan Abi Dawud, Hadith 4969; Al-Adab Al-Mufrad, Hadith 253", sunnahLink:"https://sunnah.com/adab:253",
    tags:["children","kindness","parenting","community","empathy"]
  },
  {
    id:"9", title:"The Prolonged Prostration", category:"Interpersonal Relationships", categorySlug:"relationships",
    emoji:"🤲", shortDesc:"During prayer, a child climbed his back. He prolonged the prostration until the child was satisfied — then calmly continued.",
    story:"During a congregational prostration (Sujud), a child climbed onto the back of the Prophet ﷺ. He prolonged the prostration so significantly that companions feared something had happened. When asked if he received revelation during that long pause, he clarified: \"Nothing at all happened, but my son was on my back and I did not wish to disturb him until he had had enough.\" He also stated: \"When I stand for prayer, I intend to prolong it, but on hearing the cries of a child, I cut it short, as I dislike to trouble the child's mother.\"",
    modernApplication:"When a child interrupts something important — a meeting, a prayer, a conversation — honor the interruption before resuming. This communicates to the child that they are not an inconvenience. The brief pause costs you seconds; the message it sends them will last a lifetime.",
    citation:"Sunan an-Nasa'i, Hadith 1141; Sahih al-Bukhari, Hadith 707", sunnahLink:"https://sunnah.com/bukhari:707",
    tags:["children","prayer","patience","parenting","mercy"]
  },
  {
    id:"10", title:"Whole-Body Listening", category:"Interpersonal Relationships", categorySlug:"relationships",
    emoji:"👂", shortDesc:"When someone spoke to him, he turned his entire torso to face them — absolute, undivided physical and psychological attention.",
    story:"When someone called out to him or spoke to him, the Prophet ﷺ did not merely turn his neck or offer a dismissive sidelong glance. He turned his entire torso to face the speaker squarely, granting them his absolute, undivided physical and psychological attention. His speech was equally disciplined: he would allow a speaker to finish their thought entirely without interruption. Only when the speaker had completely exhausted their words would he ask, \"Have you finished?\" before delivering his response.",
    modernApplication:"Practice 'whole-body listening.' When someone speaks to you, physically turn toward them — put down your phone, close the laptop, make eye contact. Allow them to finish completely before formulating your response. This single habit, applied consistently, will transform your relationships.",
    citation:"Ash-Shamail Al-Muhammadiyyah; Al-Adab Al-Mufrad, Hadith 1115", sunnahLink:"https://sunnah.com/adab:1115",
    tags:["communication","listening","presence","relationships","emotional-intelligence"]
  },
  {
    id:"11", title:"The Perpetual Smile", category:"Interpersonal Relationships", categorySlug:"relationships",
    emoji:"☀️", shortDesc:"His resting expression was perpetually cheerful. 'I have never seen anyone smile more than Allah's Messenger.'",
    story:"The physical presence of the Prophet ﷺ was described by companions as perpetually cheerful. Abdullah ibn Al-Harith noted: \"I have never seen anyone smile more than Allah's Messenger.\" Yet his joy was refined — he rarely engaged in uproarious, open-mouthed laughter that compromised his dignity. His laughter was predominantly a broad smile that illuminated his face, with companions poetically likening his teeth to hailstones. His walk was purposeful and energetic — brisk, lifting his feet firmly and leaning slightly forward, as if descending a slope.",
    modernApplication:"Consciously soften your resting expression. Most people's default face communicates stress, distance, or disapproval. A gentle, relaxed facial expression is one of the most powerful gifts you can give those around you — it signals safety, warmth, and welcome. The Prophet ﷺ said: 'Your smile at your brother is charity.'",
    citation:"Ash-Shamail Al-Muhammadiyyah, Chapter 9; Jami' at-Tirmidhi, Hadith 3641", sunnahLink:"https://sunnah.com/tirmidhi:3641",
    tags:["demeanor","smile","community","character","joy"]
  },
  {
    id:"12", title:"Ethical Commerce", category:"Commerce & Public Life", categorySlug:"commerce",
    emoji:"🤝", shortDesc:"He prayed for Allah's mercy upon the lenient buyer, seller, and debt-collector. Ease was his commercial ethic.",
    story:"The Prophet ﷺ actively participated in the marketplace, modeling an attitude of grace, leniency, and absolute honesty. He established the ethical baseline: \"May Allah's mercy be on him who is lenient in his buying, selling, and in demanding back his money.\" He once encountered a companion, Jabir ibn Abdillah, riding a tired camel. He made du'a for the camel, causing it to become vigorous and energetic, then bought the camel, allowed Jabir to ride it home, and sent payment over and above the agreed price — embodying overdelivering on a transaction.",
    modernApplication:"In every commercial transaction, ask: 'Am I being the lenient party here?' In negotiations, invoices, and debt collection, build in generosity. If you owe someone money, pay them back with a gift of gratitude. If someone owes you, grant them ease. This is not weakness; it is prophetic financial character.",
    citation:"Sahih al-Bukhari, Hadith 2076; Sahih Muslim, Hadith 1579", sunnahLink:"https://sunnah.com/bukhari:2076",
    tags:["commerce","business","ethics","finance","generosity"]
  },
  {

// ── STORAGE ───────────────────────────────────────────────────────────────────
function load(key, fallback) {
  try { const v = localStorage.getItem(key); return v !== null ? JSON.parse(v) : fallback; }
  catch { return fallback; }
}
function save(key, val) { try { localStorage.setItem(key, JSON.stringify(val)); } catch {} }

// ── PARTICLES ─────────────────────────────────────────────────────────────────
function Particles({active}) {
  if (!active) return null;
  const pts = [0,1,2,3,4,5,6,7].map(i => {
    const a = (i/8)*360;
    return {tx: Math.round(Math.cos(a*Math.PI/180)*26), ty: Math.round(Math.sin(a*Math.PI/180)*26),
      color: ["#E8A020","#7AA05A","#E8855A","#F5C842","#5A7A4A","#C4622D","#E8C042","#3A9A8A"][i]};
  });
  return (
    <div style={{position:"absolute",inset:0,pointerEvents:"none",overflow:"visible",zIndex:10}}>
      {pts.map((p,i)=>(
        <div key={i} style={{
          position:"absolute", top:"50%", left:"50%",
          width:7, height:7, borderRadius:"50%", background:p.color,
          "--tx":`${p.tx}px`,"--ty":`${p.ty}px`,
          animation:`particleBurst 0.55s ${i*0.03}s cubic-bezier(0,0.5,0.5,1) both`,
        }}/>
      ))}
    </div>
  );
}

        </div>
      </div>
    </div>
  );
}

// ── CHECKLIST TAB ──────────────────────────────────────────────────────────────
function ChecklistTab({routine, checked, onToggle, burstId, onHabit}) {
  const mine = HABITS.filter(h=>routine.includes(h.id));
  const done = mine.filter(h=>checked.includes(h.id)).length;
  const pct = mine.length?(done/mine.length):0;
  const allDone = mine.length>0&&done===mine.length;
  return (
    <div className="screen">
      <div style={{padding:"20px 20px 16px",background:"var(--warm-white)",borderBottom:"1px solid var(--border-soft)"}}>
        <p style={{fontSize:11,color:"var(--ink-muted)",letterSpacing:"0.07em",textTransform:"uppercase",fontWeight:600,marginBottom:3}}>Today's Practice</p>
        <h1 className="font-display" style={{fontSize:27,fontWeight:700,color:"var(--ink)",marginBottom:mine.length?16:0,lineHeight:1.15}}>My Daily Routine</h1>
        {mine.length>0&&(
          <>
            <div style={{display:"flex",justifyContent:"space-between",marginBottom:7}}>
              <span style={{fontSize:13,color:"var(--ink-soft)",fontWeight:500}}>{done} of {mine.length} complete</span>
              <span style={{fontSize:13,color:"var(--sage)",fontWeight:700}}>{Math.round(pct*100)}%</span>
            </div>
            <div style={{height:9,background:"var(--border)",borderRadius:5,overflow:"hidden"}}>
              <div style={{height:"100%",width:`${pct*100}%`,background:"linear-gradient(90deg,var(--sage),var(--sage-light))",borderRadius:5,transition:"width 0.5s cubic-bezier(0.34,1.56,0.64,1)"}}/>
            </div>
          </>
        )}
      </div>
      <div style={{padding:"16px"}}>
        {mine.length===0?(
          <div className="anim-scale-in" style={{textAlign:"center",padding:"64px 24px"}}>
            <div style={{fontSize:56,marginBottom:16}}>🌱</div>
            <h3 className="font-display" style={{fontSize:21,fontWeight:600,color:"var(--ink)",marginBottom:10}}>Your routine is empty</h3>
            <p style={{fontSize:14,color:"var(--ink-soft)",lineHeight:1.65}}>Head to Discover and add habits that resonate with you to begin building your daily sublime character.</p>
          </div>
        ):(
          <>
            {allDone&&(
              <div className="anim-scale-in" style={{background:"linear-gradient(135deg,var(--sage),var(--sage-light))",borderRadius:14,padding:"15px 20px",marginBottom:14,textAlign:"center"}}>
                <p style={{color:"white",fontSize:15,fontWeight:600}}>🌟 Masha'Allah! All habits complete today!</p>
              </div>
            )}
            <div style={{display:"flex",flexDirection:"column",gap:10}}>
              {mine.map((h,i)=>{
                const isDone=checked.includes(h.id);
                const isBurst=burstId===h.id;
                return (
                  <div key={h.id} className={`checklist-item anim-fade-up ${isDone?"completed":""}`}
                    style={{animationDelay:`${i*55}ms`}} onClick={()=>onHabit(h)}>
                    {/* Check circle */}
                    <div onClick={e=>{e.stopPropagation();onToggle(h.id);}}
                      className={`check-circle ${isDone?"done":""}`} style={{position:"relative",overflow:"visible"}}>
                      {isDone&&<svg width="14" height="14" viewBox="0 0 14 14" fill="none">
                        <path d="M2.5 7.5L5.5 10.5L11.5 4" stroke="white" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round"
                          style={{strokeDasharray:100,strokeDashoffset:0,animation:"checkDraw 0.35s ease both"}}/>
                      </svg>}
                      <Particles active={isBurst}/>
                    </div>
                    <div style={{flex:1,minWidth:0}}>
                      <p style={{fontSize:15,fontWeight:600,color:isDone?"var(--sage)":"var(--ink)",marginBottom:3,lineHeight:1.3}}>
                        {h.emoji} {h.title}
                      </p>
                      <p style={{fontSize:12,color:"var(--ink-muted)",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>
                        {h.category}
                      </p>
                    </div>
                    <span style={{fontSize:19,opacity:0.25,color:"var(--ink)"}}>›</span>
                  </div>
                );
              })}
            </div>
          </>
        )}
      </div>
    </div>
  );
}

// ── STREAK TAB ─────────────────────────────────────────────────────────────────
function StreakTab({streak, routine, checked}) {
  const mine = HABITS.filter(h=>routine.includes(h.id));
  const done = mine.filter(h=>checked.includes(h.id)).length;
  const milestones = [
    {days:3,  emoji:"🌱",label:"Sapling"},
    {days:7,  emoji:"🌿",label:"Growing"},
    {days:21, emoji:"🌳",label:"Established"},
    {days:40, emoji:"🌟",label:"Sunnah Forty"},
    {days:100,emoji:"🔥",label:"Century"},
  ];
  const achieved = milestones.filter(m=>m.days<=streak);
  const current = achieved[achieved.length-1];
  return (
    <div className="screen">
      <div style={{padding:"20px 20px 16px",background:"var(--warm-white)",borderBottom:"1px solid var(--border-soft)"}}>
        <p style={{fontSize:11,color:"var(--ink-muted)",letterSpacing:"0.07em",textTransform:"uppercase",fontWeight:600,marginBottom:3}}>Your Journey</p>
        <h1 className="font-display" style={{fontSize:27,fontWeight:700,color:"var(--ink)",lineHeight:1.15}}>Streak & Progress</h1>
      </div>
      <div style={{padding:"16px"}}>
        {/* Main streak card */}
        <div className="streak-bg anim-fade-up" style={{padding:"30px 24px",marginBottom:16,textAlign:"center"}}>
          <div className="geo-bg"/>
          <div style={{position:"relative"}}>
            <div style={{fontSize:60,lineHeight:1,marginBottom:4}}>🔥</div>
            <div className="font-display" style={{fontSize:76,fontWeight:700,color:"white",lineHeight:0.9,marginBottom:10,animation:"rollNumber 0.4s ease both"}}>
              {streak}
            </div>
            <p style={{color:"rgba(255,255,255,0.88)",fontSize:17,fontWeight:500}}>
              {streak===1?"day streak":"days streak"}
            </p>
            {current&&(
              <div style={{marginTop:14,display:"inline-flex",alignItems:"center",gap:7,background:"rgba(255,255,255,0.2)",borderRadius:20,padding:"7px 16px"}}>
                <span style={{fontSize:18}}>{current.emoji}</span>
                <span style={{color:"white",fontSize:14,fontWeight:600}}>{current.label}</span>
              </div>
            )}
          </div>
        </div>

        {/* Stats */}
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginBottom:22}}>
          <div className="card anim-fade-up" style={{padding:"16px",textAlign:"center",cursor:"default",animationDelay:"0.05s"}}>
            <div style={{fontSize:30,marginBottom:6}}>📋</div>
            <div className="font-display" style={{fontSize:30,fontWeight:700,color:"var(--terra)"}}>{mine.length}</div>
            <p style={{fontSize:12,color:"var(--ink-muted)"}}>In Routine</p>
          </div>
          <div className="card anim-fade-up" style={{padding:"16px",textAlign:"center",cursor:"default",animationDelay:"0.1s"}}>
            <div style={{fontSize:30,marginBottom:6}}>✅</div>
            <div className="font-display" style={{fontSize:30,fontWeight:700,color:"var(--sage)"}}>{done}</div>
            <p style={{fontSize:12,color:"var(--ink-muted)"}}>Done Today</p>
          </div>
        </div>

        {/* Milestones */}
        <h3 className="font-display" style={{fontSize:18,fontWeight:600,color:"var(--ink)",marginBottom:12}}>Milestones</h3>
        <div style={{display:"flex",flexDirection:"column",gap:10}}>
          {milestones.map((m,i)=>{
            const r=streak>=m.days;
            return (
              <div key={m.days} className={`milestone-item anim-fade-up ${r?"reached":""}`}
                style={{animationDelay:`${i*65}ms`}}>
                <span style={{fontSize:30,opacity:r?1:0.3}}>{m.emoji}</span>
                <div style={{flex:1}}>
                  <p style={{fontSize:15,fontWeight:600,color:r?"var(--sage)":"var(--ink-muted)"}}>{m.days} Days — {m.label}</p>
                  <p style={{fontSize:12,color:"var(--ink-muted)"}}>
                    {r?"Achieved ✓":`${m.days-streak} day${m.days-streak!==1?"s":""} to go`}
                  </p>
                </div>
                {r&&<span style={{fontSize:22}}>🌟</span>}
              </div>
            );
          })}
        </div>

        <div style={{marginTop:24,padding:"16px",background:"var(--parchment)",borderRadius:14,border:"1.5px solid var(--border)",textAlign:"center"}}>
          <p className="font-display" style={{fontSize:15,fontStyle:"italic",color:"var(--ink-soft)",lineHeight:1.65}}>
            "The most beloved of deeds to Allah are those that are most consistent, even if they are small."
          </p>
          <p style={{fontSize:11,color:"var(--ink-muted)",marginTop:8}}>Sahih al-Bukhari, Hadith 6465</p>
        </div>
      </div>
    </div>
  );
}

// ── ROOT APP ───────────────────────────────────────────────────────────────────
function App() {
  const [onboarded, setOnboarded] = useState(()=>load("sc_onboarded",false));
  const [tab, setTab] = useState("discover");
  const [routine, setRoutine] = useState(()=>load("sc_routine",[]));
  const [checked, setChecked] = useState(()=>{
    const today=new Date().toDateString();
    const s=load("sc_checked",{date:today,ids:[]});
    return s.date===today?s.ids:[];
  });
  const [streak, setStreak] = useState(()=>load("sc_streak",0));
  const [selected, setSelected] = useState(null);
  const [burstId, setBurstId] = useState(null);

  useEffect(()=>{
    const today=new Date().toDateString();
    const last=load("sc_lastLogin",null);
    if(last!==today){
      const yest=new Date(); yest.setDate(yest.getDate()-1);
      const wasYest=last===yest.toDateString();
      const ns=wasYest?streak+1:(last?0:streak);
      setStreak(ns); save("sc_streak",ns); save("sc_lastLogin",today);
    }
  },[]);

  useEffect(()=>{save("sc_routine",routine);},[routine]);
  useEffect(()=>{save("sc_checked",{date:new Date().toDateString(),ids:checked});},[checked]);
  useEffect(()=>{save("sc_onboarded",onboarded);},[onboarded]);

  const addRemove = useCallback(id=>{
    setRoutine(r=>r.includes(id)?r.filter(x=>x!==id):[...r,id]);
  },[]);

  const toggle = useCallback(id=>{
    setBurstId(id);
    setTimeout(()=>setBurstId(null),700);
    setChecked(c=>c.includes(id)?c.filter(x=>x!==id):[...c,id]);
  },[]);

  const TABS = [
    {id:"discover", icon:"🔍", label:"Discover"},
    {id:"checklist", icon:"☑️", label:"My Routine"},
    {id:"streak",   icon:"🔥", label:`${streak} Day${streak!==1?"s":""}`},
  ];

  if(!onboarded) return <Onboarding onDone={()=>setOnboarded(true)}/>;

  return (
    <>
      <div style={{flex:1,overflow:"hidden",display:"flex",flexDirection:"column"}}>
        {tab==="discover"  && <DiscoverTab  routine={routine} onAdd={addRemove} onHabit={setSelected}/>}
        {tab==="checklist" && <ChecklistTab routine={routine} checked={checked} onToggle={toggle} burstId={burstId} onHabit={setSelected}/>}
        {tab==="streak"    && <StreakTab    streak={streak}   routine={routine} checked={checked}/>}
      </div>
      <nav className="tab-bar">
        {TABS.map(t=>(
          <button key={t.id} className={`tab-btn ${tab===t.id?"active":""}`} onClick={()=>setTab(t.id)}>
            <span className="tab-icon">{t.icon}</span>
            {t.label}
          </button>
        ))}
      </nav>
      {selected&&<DetailSheet habit={selected} inRoutine={routine.includes(selected.id)} onAdd={id=>{addRemove(id);}} onClose={()=>setSelected(null)}/>}
    </>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
