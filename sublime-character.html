<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#C4622D" />
  <meta name="description" content="Discover the daily habits, manners, and emotional wisdom of Prophet Muhammad ﷺ — verified from classical Islamic sources." />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="Sublime Character" />
  <title>Sublime Character</title>
  <link rel="preload" href="/habits.json" as="fetch" crossorigin="anonymous" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,300&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --gold: #E8A020;
      --gold-light: #F5C842;
      --gold-pale: #FDF3D0;
      --terra: #C4622D;
      --terra-light: #E8855A;
      --terra-pale: #FDE8D8;
      --sage: #5A7A4A;
      --sage-light: #7AA05A;
      --sage-pale: #E8F0E0;
      --teal: #2A7A6A;
      --teal-pale: #D8F0E8;
      --cream: #FDFAF2;
      --parchment: #F5EED8;
      --warm-white: #FFFEF8;
      --ink: #1A1208;
      --ink-mid: #3D2E12;
      --ink-soft: #6B5530;
      --ink-muted: #9A8060;
      --border: #E8D8B8;
      --border-soft: #F0E4C8;
      --shadow-warm: rgba(200, 140, 40, 0.12);
      --radius: 16px;
      --radius-sm: 10px;
      --radius-lg: 24px;
      --tab-h: 68px;
    }

    html, body { height: 100%; background: var(--cream); }
    body {
      font-family: 'DM Sans', system-ui, sans-serif;
      color: var(--ink);
      overflow: hidden;
      height: 100dvh;
    }
    #root { height: 100dvh; display: flex; flex-direction: column; }

    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    @keyframes scaleIn {
      from { opacity: 0; transform: scale(0.94) translateY(20px); }
      to { opacity: 1; transform: scale(1) translateY(0); }
    }
    @keyframes checkDraw {
      from { stroke-dashoffset: 100; opacity: 0; }
      to { stroke-dashoffset: 0; opacity: 1; }
    }
    @keyframes particleBurst {
      0% { transform: translate(-50%, -50%) scale(0); opacity: 1; }
      100% { transform: translate(calc(-50% + var(--tx)), calc(-50% + var(--ty))) scale(1); opacity: 0; }
    }
    @keyframes pulseGold {
      0% { box-shadow: 0 0 0 0 rgba(232, 160, 32, 0.5); }
      70% { box-shadow: 0 0 0 10px rgba(232, 160, 32, 0); }
      100% { box-shadow: 0 0 0 0 rgba(232, 160, 32, 0); }
    }
    @keyframes bloomIn {
      0% { transform: scale(0.6) rotate(-20deg); opacity: 0; }
      65% { transform: scale(1.08) rotate(3deg); opacity: 1; }
      100% { transform: scale(1) rotate(0deg); opacity: 1; }
    }
    @keyframes slideUp {
      from { transform: translateY(100%); }
      to { transform: translateY(0); }
    }
    @keyframes rollNumber {
      from { transform: translateY(12px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }

    .font-display { font-family: 'Playfair Display', Georgia, serif; }
    .screen {
      flex: 1; overflow-y: auto; overflow-x: hidden;
      padding-bottom: calc(var(--tab-h) + 12px);
      -webkit-overflow-scrolling: touch;
    }
    .tab-bar {
      height: var(--tab-h);
      background: rgba(255, 254, 248, 0.96);
      border-top: 1.5px solid var(--border);
      display: flex; align-items: center; padding: 0 8px;
      flex-shrink: 0;
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
    }
    .tab-btn {
      flex: 1; display: flex; flex-direction: column; align-items: center; gap: 3px;
      padding: 8px 4px; border: none; background: none; cursor: pointer;
      color: var(--ink-muted); font-family: 'DM Sans', sans-serif;
      font-size: 10.5px; font-weight: 500; letter-spacing: 0.01em;
      border-radius: var(--radius-sm);
      transition: color 0.2s, background 0.2s;
      -webkit-tap-highlight-color: transparent;
    }
    .tab-btn.active { color: var(--terra); }
    .tab-icon {
      width: 30px; height: 30px; display: flex; align-items: center; justify-content: center;
      border-radius: 9px; font-size: 17px;
      transition: background 0.2s, transform 0.2s;
    }
    .tab-btn.active .tab-icon { background: var(--terra-pale); transform: scale(1.05); }

    .card {
      background: var(--warm-white);
      border: 1.5px solid var(--border-soft);
      border-radius: var(--radius); overflow: hidden;
      transition: transform 0.2s, box-shadow 0.2s;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }
    .card:active { transform: scale(0.985); }

    .fab {
      display: flex; align-items: center; justify-content: center; gap: 8px;
      padding: 14px 24px; border: none; border-radius: 50px;
      font-family: 'DM Sans', sans-serif; font-size: 15px; font-weight: 600;
      cursor: pointer; transition: transform 0.2s, box-shadow 0.2s;
      -webkit-tap-highlight-color: transparent; width: 100%;
    }
    .fab:active { transform: scale(0.97); }
    .fab-primary {
      background: linear-gradient(135deg, var(--terra) 0%, var(--terra-light) 100%);
      color: white; box-shadow: 0 4px 16px rgba(196, 98, 45, 0.35);
    }
    .fab-secondary {
      background: var(--sage-pale); color: var(--sage);
      border: 1.5px solid var(--sage-light);
    }
    .fab-ghost {
      background: none; color: var(--ink-soft);
      border: 1.5px solid var(--border);
    }

    .search-input {
      width: 100%; padding: 11px 16px 11px 42px;
      border: 1.5px solid var(--border); border-radius: 12px;
      background: var(--warm-white); font-family: 'DM Sans', sans-serif;
      font-size: 14px; color: var(--ink); outline: none;
      transition: border-color 0.2s;
    }
    .search-input:focus { border-color: var(--gold); }
    .search-input::placeholder { color: var(--ink-muted); }

    .category-pill {
      display: inline-flex; align-items: center; gap: 5px;
      padding: 3px 9px; border-radius: 20px;
      font-size: 10.5px; font-weight: 700; letter-spacing: 0.04em; text-transform: uppercase;
    }

    .checklist-item {
      display: flex; align-items: center; gap: 14px;
      padding: 14px 16px;
      background: var(--warm-white); border: 1.5px solid var(--border-soft);
      border-radius: 12px; cursor: pointer;
      transition: background 0.25s, border-color 0.25s, transform 0.15s;
      -webkit-tap-highlight-color: transparent; user-select: none;
    }
    .checklist-item:active { transform: scale(0.985); }
    .checklist-item.completed { background: var(--sage-pale); border-color: var(--sage-light); }

    .check-circle {
      width: 30px; height: 30px; flex-shrink: 0; border-radius: 50%;
      border: 2.5px solid var(--border);
      display: flex; align-items: center; justify-content: center;
      transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
      position: relative; overflow: visible;
      background: white;
    }
    .check-circle.done {
      border-color: var(--sage); background: var(--sage);
      animation: pulseGold 0.5s ease;
    }

    .streak-bg {
      background: linear-gradient(135deg, var(--terra) 0%, var(--gold) 100%);
      border-radius: var(--radius); position: relative; overflow: hidden;
    }
    .geo-bg {
      position: absolute; inset: 0; opacity: 0.07;
      background-image: url("data:image/svg+xml,%3Csvg width='80' height='80' viewBox='0 0 80 80' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='white'%3E%3Cpolygon points='40,5 65,20 75,47 60,72 20,72 5,47 15,20' opacity='0.5'/%3E%3Cpolygon points='40,15 58,26 65,47 55,65 25,65 15,47 22,26' opacity='0.3'/%3E%3C/g%3E%3C/svg%3E");
      pointer-events: none;
    }

    .detail-overlay {
      position: fixed; inset: 0; background: rgba(8, 4, 0, 0.55); z-index: 100;
      backdrop-filter: blur(6px); -webkit-backdrop-filter: blur(6px);
      animation: fadeIn 0.2s ease;
    }
    .detail-sheet {
      position: fixed; bottom: 0; left: 0; right: 0;
      background: var(--cream); border-radius: 26px 26px 0 0;
      max-height: 93dvh; overflow-y: auto; z-index: 101;
      animation: slideUp 0.35s cubic-bezier(0.32, 0.72, 0, 1);
      padding-bottom: max(env(safe-area-inset-bottom, 0px), 20px);
      box-shadow: 0 -8px 40px rgba(20, 10, 0, 0.2);
    }
    .sheet-handle {
      width: 42px; height: 4.5px; background: var(--border);
      border-radius: 3px; margin: 14px auto 0;
    }

    .onboard-screen {
      position: fixed; inset: 0; background: var(--cream); z-index: 200;
      display: flex; flex-direction: column; animation: fadeIn 0.4s ease;
    }

    .milestone-item {
      display: flex; align-items: center; gap: 14px;
      padding: 14px 16px; border-radius: 12px;
      border: 1.5px solid var(--border-soft);
      background: var(--warm-white);
      transition: background 0.2s;
    }
    .milestone-item.reached {
      background: var(--sage-pale); border-color: var(--sage-light);
    }

    .anim-fade-up { animation: fadeUp 0.45s ease both; }
    .anim-scale-in { animation: scaleIn 0.4s ease both; }
    .anim-bloom { animation: bloomIn 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) both; }
  </style>
</head>
<body>
<div id="root"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.3.1/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.3.1/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>

<script type="text/babel">
const { useState, useEffect, useCallback, useRef } = React;

// ── DATA ──────────────────────────────────────────────────────────────────────

const CATEGORIES = [
  {slug:"all", label:"All", emoji:"✨"},
  {slug:"personal", label:"Personal & Home", emoji:"🏠"},
  {slug:"relationships", label:"Relationships", emoji:"💛"},
  {slug:"commerce", label:"Commerce", emoji:"🤝"},
  {slug:"emotional", label:"Emotional Intelligence", emoji:"🧘"},
  {slug:"environment", label:"Nature & Environment", emoji:"🌿"},
  {slug:"nuanced", label:"Nuanced Expressions", emoji:"✨"},
];

const CAT_COLORS = {
  personal:      {bg:"var(--gold-pale)",   color:"#A06800", border:"#E8C042"},
  relationships: {bg:"var(--terra-pale)",  color:"var(--terra)", border:"var(--terra-light)"},
  commerce:      {bg:"var(--teal-pale)",   color:"var(--teal)",  border:"#3A9A8A"},
  emotional:     {bg:"var(--sage-pale)",   color:"var(--sage)",  border:"var(--sage-light)"},
  environment:   {bg:"#E8F4E8",            color:"#2A6A3A",      border:"#5A9A5A"},
  nuanced:       {bg:"var(--parchment)",   color:"var(--ink-soft)", border:"var(--border)"},
};

// ── STORAGE ───────────────────────────────────────────────────────────────────
function load(key, fallback) {
  try { const v = localStorage.getItem(key); return v !== null ? JSON.parse(v) : fallback; }
  catch { return fallback; }
}
function save(key, val) { try { localStorage.setItem(key, JSON.stringify(val)); } catch {} }

// ── PARTICLES ─────────────────────────────────────────────────────────────────
function Particles({active}) {
  if (!active) return null;
  const pts = [0,1,2,3,4,5,6,7].map(i => {
    const a = (i/8)*360;
    return {tx: Math.round(Math.cos(a*Math.PI/180)*26), ty: Math.round(Math.sin(a*Math.PI/180)*26),
      color: ["#E8A020","#7AA05A","#E8855A","#F5C842","#5A7A4A","#C4622D","#E8C042","#3A9A8A"][i]};
  });
  return (
    <div style={{position:"absolute",inset:0,pointerEvents:"none",overflow:"visible",zIndex:10}}>
      {pts.map((p,i)=>(
        <div key={i} style={{
          position:"absolute", top:"50%", left:"50%",
          width:7, height:7, borderRadius:"50%", background:p.color,
          "--tx":`${p.tx}px`,"--ty":`${p.ty}px`,
          animation:`particleBurst 0.55s ${i*0.03}s cubic-bezier(0,0.5,0.5,1) both`,
        }}/>
      ))}
    </div>
  );
}

// ── CATEGORY PILL ─────────────────────────────────────────────────────────────
function CPill({slug, label}) {
  const c = CAT_COLORS[slug]||CAT_COLORS.nuanced;
  return <span className="category-pill" style={{background:c.bg,color:c.color,border:`1px solid ${c.border}`}}>{label}</span>;
}

// ── HABIT CARD ────────────────────────────────────────────────────────────────
function HabitCard({habit, inRoutine, onAdd, onClick, delay=0}) {
  const c = CAT_COLORS[habit.categorySlug]||CAT_COLORS.nuanced;
  return (
    <div className="card anim-fade-up" style={{animationDelay:`${delay}ms`}} onClick={()=>onClick(habit)}>
      <div style={{padding:"17px 17px 13px", borderLeft:`4px solid ${c.color}`}}>
        <div style={{display:"flex",alignItems:"flex-start",justifyContent:"space-between",gap:10,marginBottom:9}}>
          <div style={{display:"flex",alignItems:"flex-start",gap:10,flex:1,minWidth:0}}>
            <span style={{fontSize:30,lineHeight:1,flexShrink:0}}>{habit.emoji}</span>
            <div style={{flex:1,minWidth:0}}>
              <h3 className="font-display" style={{fontSize:16,fontWeight:600,color:"var(--ink)",lineHeight:1.25,marginBottom:5}}>
                {habit.title}
              </h3>
              <CPill slug={habit.categorySlug} label={habit.category.split("&")[0].trim().replace("The Natural World ","Nature ")} />
            </div>
          </div>
          <button
            onClick={e=>{e.stopPropagation();onAdd(habit.id);}}
            style={{
              flexShrink:0,width:32,height:32,borderRadius:"50%",
              border:`1.5px solid ${inRoutine?c.color:"var(--border)"}`,
              background:inRoutine?c.bg:"transparent",
              color:inRoutine?c.color:"var(--ink-muted)",
              fontSize:inRoutine?14:18,cursor:"pointer",
              display:"flex",alignItems:"center",justifyContent:"center",
              transition:"all 0.2s",fontFamily:"DM Sans,sans-serif",fontWeight:600,
            }}>
            {inRoutine?"✓":"+"}
          </button>
        </div>
        <p style={{fontSize:13.5,color:"var(--ink-soft)",lineHeight:1.55,marginBottom:9}}>{habit.shortDesc}</p>
        <p style={{fontSize:11,color:"var(--ink-muted)",fontStyle:"italic"}}>📚 {habit.citation}</p>
      </div>
    </div>
  );
}

// ── DETAIL SHEET ──────────────────────────────────────────────────────────────
function DetailSheet({habit, inRoutine, onAdd, onClose}) {
  if (!habit) return null;
  const c = CAT_COLORS[habit.categorySlug]||CAT_COLORS.nuanced;
  const share = () => {
    const text = `✨ ${habit.title}\n\n${habit.shortDesc}\n\n${habit.story.slice(0,240)}...\n\n📚 Source: ${habit.citation}\n\n🌱 Discover Prophetic habits on Sublime Character`;
    if (navigator.share) navigator.share({title:habit.title, text});
    else window.open(`https://wa.me/?text=${encodeURIComponent(text)}`,"_blank");
  };
  return (
    <>
      <div className="detail-overlay" onClick={onClose}/>
      <div className="detail-sheet">
        <div className="sheet-handle"/>
        <div style={{padding:"18px 20px 0",borderBottom:"1px solid var(--border-soft)",paddingBottom:16}}>
          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:10}}>
            <CPill slug={habit.categorySlug} label={habit.category}/>
            <button onClick={onClose} style={{background:"none",border:"none",fontSize:22,cursor:"pointer",color:"var(--ink-muted)",padding:"4px 8px",borderRadius:8}}>✕</button>
          </div>
          <div style={{display:"flex",alignItems:"center",gap:14}}>
            <span style={{fontSize:46,lineHeight:1}}>{habit.emoji}</span>
            <h2 className="font-display" style={{fontSize:22,fontWeight:700,lineHeight:1.2,color:"var(--ink)"}}>{habit.title}</h2>
          </div>
        </div>

        <div style={{padding:"20px"}}>
          <p style={{fontSize:11,fontWeight:700,letterSpacing:"0.1em",textTransform:"uppercase",color:"var(--ink-muted)",marginBottom:9}}>The Prophetic Narrative</p>
          <p style={{fontSize:14.5,lineHeight:1.75,color:"var(--ink-mid)",marginBottom:22}}>{habit.story}</p>

          <div style={{background:`linear-gradient(135deg,${c.bg},var(--warm-white))`,border:`1.5px solid ${c.border}`,borderRadius:14,padding:"16px",marginBottom:18}}>
            <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:9}}>
              <span style={{fontSize:18}}>🌱</span>
              <p style={{fontSize:11,fontWeight:700,letterSpacing:"0.08em",textTransform:"uppercase",color:c.color}}>Modern Application</p>
            </div>
            <p style={{fontSize:14,lineHeight:1.65,color:"var(--ink-mid)"}}>{habit.modernApplication}</p>
          </div>

          <div style={{background:"var(--parchment)",border:"1.5px solid var(--border)",borderRadius:12,padding:"13px 15px",marginBottom:22}}>
            <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:6}}>
              <span style={{fontSize:14}}>📚</span>
              <span style={{fontSize:11,fontWeight:700,letterSpacing:"0.08em",textTransform:"uppercase",color:"var(--ink-muted)"}}>Exact Source</span>
            </div>
            <p style={{fontSize:13,color:"var(--ink-soft)",fontStyle:"italic",lineHeight:1.5,marginBottom:8}}>{habit.citation}</p>
            <a href={habit.sunnahLink} target="_blank" rel="noopener noreferrer"
              style={{fontSize:12,color:"var(--teal)",textDecoration:"none",display:"inline-flex",alignItems:"center",gap:4}}
              onClick={e=>e.stopPropagation()}>
              View on Sunnah.com →
            </a>
          </div>

          <div style={{display:"flex",flexDirection:"column",gap:10}}>
            <button className="fab fab-primary" onClick={()=>onAdd(habit.id)}>
              {inRoutine?"✓  In Your Daily Routine":"＋  Add to My Daily Routine"}
            </button>
            <button className="fab fab-secondary" onClick={share}>
              📤  Share this Story
            </button>
          </div>
        </div>
      </div>
    </>
  );
}

// ── ONBOARDING ────────────────────────────────────────────────────────────────
function Onboarding({onDone}) {
  const [step, setStep] = useState(0);
  const steps = [
    {emoji:"✨",title:"Welcome to\nSublime Character",body:"Discover the daily habits, manners, and emotional wisdom of Prophet Muhammad ﷺ — verified from classical Islamic sources.",color:"var(--terra)"},
    {emoji:"📖",title:"Read Authentic\nStories",body:"Every habit carries its full narrative, modern application, and exact Hadith citation linked to primary classical sources.",color:"var(--teal)"},
    {emoji:"🌱",title:"Build Your Daily\nSublime Character",body:"Add habits to your routine, check them off each day, and build a beautiful streak of consistent Prophetic character.",color:"var(--sage)"},
  ];
  const s = steps[step];
  return (
    <div className="onboard-screen">
      <div style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:"48px 32px 24px"}}>
        {/* Geometric art */}
        <div className="anim-bloom" key={step} style={{width:180,height:180,position:"relative",marginBottom:36}}>
          <svg viewBox="0 0 180 180" style={{position:"absolute",inset:0,width:"100%",height:"100%",opacity:0.13}}>
            <polygon points="90,10 148,45 165,110 130,162 50,162 15,110 32,45" fill="none" stroke={s.color} strokeWidth="2"/>
            <polygon points="90,30 134,58 148,110 120,148 60,148 32,110 46,58" fill="none" stroke={s.color} strokeWidth="1.5"/>
            <polygon points="90,50 120,70 130,110 110,135 70,135 50,110 60,70" fill="none" stroke={s.color} strokeWidth="1"/>
          </svg>
          <div style={{position:"absolute",inset:0,display:"flex",alignItems:"center",justifyContent:"center"}}>
            <div style={{width:90,height:90,borderRadius:"50%",background:`${s.color}18`,border:`2px solid ${s.color}30`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:42}}>
              {s.emoji}
            </div>
          </div>
        </div>
        <h1 className="font-display anim-fade-up" key={`t${step}`} style={{fontSize:32,fontWeight:700,color:"var(--ink)",textAlign:"center",lineHeight:1.2,marginBottom:16,whiteSpace:"pre-line"}}>
          {s.title}
        </h1>
        <p className="anim-fade-up" key={`b${step}`} style={{fontSize:16,color:"var(--ink-soft)",textAlign:"center",lineHeight:1.65,maxWidth:300,animationDelay:"0.1s"}}>
          {s.body}
        </p>
      </div>
      <div style={{padding:"0 32px 52px",display:"flex",flexDirection:"column",gap:18,alignItems:"center"}}>
        <div style={{display:"flex",gap:8}}>
          {steps.map((_,i)=>(
            <div key={i} style={{width:i===step?26:8,height:8,borderRadius:4,background:i===step?s.color:"var(--border)",transition:"all 0.3s ease"}}/>
          ))}
        </div>
        <button className="fab fab-primary" style={{maxWidth:340,justifyContent:"center"}}
          onClick={()=>step<steps.length-1?setStep(s=>s+1):onDone()}>
          {step<steps.length-1?"Continue  →":"Begin My Journey  →"}
        </button>
        {step<steps.length-1&&(
          <button onClick={onDone} style={{background:"none",border:"none",color:"var(--ink-muted)",fontSize:14,cursor:"pointer",padding:"4px 12px"}}>
            Skip
          </button>
        )}
      </div>
    </div>
  );
}

// ── DISCOVER TAB ──────────────────────────────────────────────────────────────
function DiscoverTab({routine, onAddRemove, onHabitClick, habits}) {
  const [search, setSearch] = useState("");
  const [cat, setCat] = useState("all");
  const featured = habits.length > 0 ? habits[(new Date().getDate()) % habits.length] : null;
  const filtered = React.useMemo(() => habits.filter(h=>{
    const mc = cat==="all"||h.categorySlug===cat;
    const ms = !search||h.title.toLowerCase().includes(search.toLowerCase())||
      h.shortDesc.toLowerCase().includes(search.toLowerCase())||
      h.tags.some(t=>t.includes(search.toLowerCase()));
    return mc&&ms;
  }), [habits, cat, search]);
  return (
    <div className="screen">
      <div style={{padding:"20px 20px 0",background:"var(--warm-white)",borderBottom:"1px solid var(--border-soft)"}}>
        <p style={{fontSize:11,color:"var(--ink-muted)",letterSpacing:"0.07em",textTransform:"uppercase",fontWeight:600,marginBottom:3}}>
          {new Date().toLocaleDateString("en-US",{weekday:"long",month:"long",day:"numeric"})}
        </p>
        <h1 className="font-display" style={{fontSize:27,fontWeight:700,color:"var(--ink)",marginBottom:16,lineHeight:1.15}}>
          Discover Habits
        </h1>
        <div style={{position:"relative",marginBottom:12}}>
          <span style={{position:"absolute",left:13,top:"50%",transform:"translateY(-50%)",color:"var(--ink-muted)",fontSize:15,pointerEvents:"none"}}>🔍</span>
          <input className="search-input" placeholder="Search habits, tags..." value={search} onChange={e=>setSearch(e.target.value)}/>
        </div>
        <div style={{display:"flex",gap:8,overflowX:"auto",paddingBottom:14,scrollbarWidth:"none",msOverflowStyle:"none"}}>
          {CATEGORIES.map(c=>(
            <button key={c.slug} onClick={()=>setCat(c.slug)}
              style={{flexShrink:0,padding:"6px 14px",borderRadius:20,
                border:`1.5px solid ${cat===c.slug?"var(--terra)":"var(--border)"}`,
                background:cat===c.slug?"var(--terra-pale)":"transparent",
                color:cat===c.slug?"var(--terra)":"var(--ink-soft)",
                fontSize:12.5,fontWeight:600,cursor:"pointer",
                fontFamily:"DM Sans,sans-serif",transition:"all 0.2s",whiteSpace:"nowrap",
                WebkitTapHighlightColor:"transparent",
              }}>
              {c.emoji} {c.label}
            </button>
          ))}
        </div>
      </div>
      <div style={{padding:"16px"}}>
        {cat==="all"&&!search&&(
          <div style={{marginBottom:20}}>
            <p style={{fontSize:11,fontWeight:700,letterSpacing:"0.1em",textTransform:"uppercase",color:"var(--ink-muted)",marginBottom:10}}>✨ Today's Inspiration</p>
            <div className="streak-bg" onClick={()=>onHabit(featured)} style={{padding:"22px",cursor:"pointer",boxShadow:"0 6px 24px rgba(196,98,45,0.25)"}}>
              <div className="geo-bg"/>
              <div style={{position:"relative"}}>
                <span style={{fontSize:40,display:"block",marginBottom:10}}>{featured.emoji}</span>
                <h3 className="font-display" style={{fontSize:20,fontWeight:700,color:"white",marginBottom:8,lineHeight:1.2}}>{featured.title}</h3>
                <p style={{fontSize:13.5,color:"rgba(255,255,255,0.88)",lineHeight:1.55,marginBottom:12}}>{featured.shortDesc}</p>
                <span style={{fontSize:11,color:"rgba(255,255,255,0.65)",fontStyle:"italic"}}>📚 {featured.citation}</span>
              </div>
            </div>
          </div>
        )}
        <div style={{display:"flex",flexDirection:"column",gap:11}}>
          {filtered.map((h,i)=>(
            <HabitCard key={h.id} habit={h} inRoutine={routine.includes(h.id)} onAdd={onAddRemove} onClick={onHabitClick} delay={i*45}/>
          ))}
          {!filtered.length&&(
            <div style={{textAlign:"center",padding:"52px 20px",color:"var(--ink-muted)"}}>
              <div style={{fontSize:44,marginBottom:12}}>🔍</div>
              <p style={{fontSize:15}}>No habits found for "{search}"</p>
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

// ── CHECKLIST TAB ──────────────────────────────────────────────────────────────
function ChecklistTab({routine, checked, onToggle, burst, onHabitClick, habits}) {
  const mine = habits.filter(h=>routine.includes(h.id));
  const done = mine.filter(h=>checked.includes(h.id)).length;
  const pct = mine.length?(done/mine.length):0;
  const allDone = mine.length>0&&done===mine.length;
  return (
    <div className="screen">
      <div style={{padding:"20px 20px 16px",background:"var(--warm-white)",borderBottom:"1px solid var(--border-soft)"}}>
        <p style={{fontSize:11,color:"var(--ink-muted)",letterSpacing:"0.07em",textTransform:"uppercase",fontWeight:600,marginBottom:3}}>Today's Practice</p>
        <h1 className="font-display" style={{fontSize:27,fontWeight:700,color:"var(--ink)",marginBottom:mine.length?16:0,lineHeight:1.15}}>My Daily Routine</h1>
        {mine.length>0&&(
          <>
            <div style={{display:"flex",justifyContent:"space-between",marginBottom:7}}>
              <span style={{fontSize:13,color:"var(--ink-soft)",fontWeight:500}}>{done} of {mine.length} complete</span>
              <span style={{fontSize:13,color:"var(--sage)",fontWeight:700}}>{Math.round(pct*100)}%</span>
            </div>
            <div style={{height:9,background:"var(--border)",borderRadius:5,overflow:"hidden"}}>
              <div style={{height:"100%",width:`${pct*100}%`,background:"linear-gradient(90deg,var(--sage),var(--sage-light))",borderRadius:5,transition:"width 0.5s cubic-bezier(0.34,1.56,0.64,1)"}}/>
            </div>
          </>
        )}
      </div>
      <div style={{padding:"16px"}}>
        {mine.length===0?(
          <div className="anim-scale-in" style={{textAlign:"center",padding:"64px 24px"}}>
            <div style={{fontSize:56,marginBottom:16}}>🌱</div>
            <h3 className="font-display" style={{fontSize:21,fontWeight:600,color:"var(--ink)",marginBottom:10}}>Your routine is empty</h3>
            <p style={{fontSize:14,color:"var(--ink-soft)",lineHeight:1.65}}>Head to Discover and add habits that resonate with you to begin building your daily sublime character.</p>
          </div>
        ):(
          <>
            {allDone&&(
              <div className="anim-scale-in" style={{background:"linear-gradient(135deg,var(--sage),var(--sage-light))",borderRadius:14,padding:"15px 20px",marginBottom:14,textAlign:"center"}}>
                <p style={{color:"white",fontSize:15,fontWeight:600}}>🌟 Masha'Allah! All habits complete today!</p>
              </div>
            )}
            <div style={{display:"flex",flexDirection:"column",gap:10}}>
              {mine.map((h,i)=>{
                const isDone=checked.includes(h.id);
                const isBurst=burst===h.id;
                return (
                  <div key={h.id} className={`checklist-item anim-fade-up ${isDone?"completed":""}`}
                    style={{animationDelay:`${i*55}ms`}} onClick={()=>onHabitClick(h)}>
                    {/* Check circle */}
                    <div onClick={e=>{e.stopPropagation();onToggle(h.id);}}
                      className={`check-circle ${isDone?"done":""}`} style={{position:"relative",overflow:"visible"}}>
                      {isDone&&<svg width="14" height="14" viewBox="0 0 14 14" fill="none">
                        <path d="M2.5 7.5L5.5 10.5L11.5 4" stroke="white" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round"
                          style={{strokeDasharray:100,strokeDashoffset:0,animation:"checkDraw 0.35s ease both"}}/>
                      </svg>}
                      <Particles active={isBurst}/>
                    </div>
                    <div style={{flex:1,minWidth:0}}>
                      <p style={{fontSize:15,fontWeight:600,color:isDone?"var(--sage)":"var(--ink)",marginBottom:3,lineHeight:1.3}}>
                        {h.emoji} {h.title}
                      </p>
                      <p style={{fontSize:12,color:"var(--ink-muted)",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>
                        {h.category}
                      </p>
                    </div>
                    <span style={{fontSize:19,opacity:0.25,color:"var(--ink)"}}>›</span>
                  </div>
                );
              })}
            </div>
          </>
        )}
      </div>
    </div>
  );
}

// ── STREAK TAB ─────────────────────────────────────────────────────────────────
function StreakTab({streak, routine, checked, habits}) {
  const mine = habits.filter(h=>routine.includes(h.id));
  const done = mine.filter(h=>checked.includes(h.id)).length;
  const milestones = [
    {days:3,  emoji:"🌱",label:"Sapling"},
    {days:7,  emoji:"🌿",label:"Growing"},
    {days:21, emoji:"🌳",label:"Established"},
    {days:40, emoji:"🌟",label:"Sunnah Forty"},
    {days:100,emoji:"🔥",label:"Century"},
  ];
  const achieved = milestones.filter(m=>m.days<=streak);
  const current = achieved[achieved.length-1];
  return (
    <div className="screen">
      <div style={{padding:"20px 20px 16px",background:"var(--warm-white)",borderBottom:"1px solid var(--border-soft)"}}>
        <p style={{fontSize:11,color:"var(--ink-muted)",letterSpacing:"0.07em",textTransform:"uppercase",fontWeight:600,marginBottom:3}}>Your Journey</p>
        <h1 className="font-display" style={{fontSize:27,fontWeight:700,color:"var(--ink)",lineHeight:1.15}}>Streak & Progress</h1>
      </div>
      <div style={{padding:"16px"}}>
        {/* Main streak card */}
        <div className="streak-bg anim-fade-up" style={{padding:"30px 24px",marginBottom:16,textAlign:"center"}}>
          <div className="geo-bg"/>
          <div style={{position:"relative"}}>
            <div style={{fontSize:60,lineHeight:1,marginBottom:4}}>🔥</div>
            <div className="font-display" style={{fontSize:76,fontWeight:700,color:"white",lineHeight:0.9,marginBottom:10,animation:"rollNumber 0.4s ease both"}}>
              {streak}
            </div>
            <p style={{color:"rgba(255,255,255,0.88)",fontSize:17,fontWeight:500}}>
              {streak===1?"day streak":"days streak"}
            </p>
            {current&&(
              <div style={{marginTop:14,display:"inline-flex",alignItems:"center",gap:7,background:"rgba(255,255,255,0.2)",borderRadius:20,padding:"7px 16px"}}>
                <span style={{fontSize:18}}>{current.emoji}</span>
                <span style={{color:"white",fontSize:14,fontWeight:600}}>{current.label}</span>
              </div>
            )}
          </div>
        </div>

        {/* Stats */}
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginBottom:22}}>
          <div className="card anim-fade-up" style={{padding:"16px",textAlign:"center",cursor:"default",animationDelay:"0.05s"}}>
            <div style={{fontSize:30,marginBottom:6}}>📋</div>
            <div className="font-display" style={{fontSize:30,fontWeight:700,color:"var(--terra)"}}>{mine.length}</div>
            <p style={{fontSize:12,color:"var(--ink-muted)"}}>In Routine</p>
          </div>
          <div className="card anim-fade-up" style={{padding:"16px",textAlign:"center",cursor:"default",animationDelay:"0.1s"}}>
            <div style={{fontSize:30,marginBottom:6}}>✅</div>
            <div className="font-display" style={{fontSize:30,fontWeight:700,color:"var(--sage)"}}>{done}</div>
            <p style={{fontSize:12,color:"var(--ink-muted)"}}>Done Today</p>
          </div>
        </div>

        {/* Milestones */}
        <h3 className="font-display" style={{fontSize:18,fontWeight:600,color:"var(--ink)",marginBottom:12}}>Milestones</h3>
        <div style={{display:"flex",flexDirection:"column",gap:10}}>
          {milestones.map((m,i)=>{
            const r=streak>=m.days;
            return (
              <div key={m.days} className={`milestone-item anim-fade-up ${r?"reached":""}`}
                style={{animationDelay:`${i*65}ms`}}>
                <span style={{fontSize:30,opacity:r?1:0.3}}>{m.emoji}</span>
                <div style={{flex:1}}>
                  <p style={{fontSize:15,fontWeight:600,color:r?"var(--sage)":"var(--ink-muted)"}}>{m.days} Days — {m.label}</p>
                  <p style={{fontSize:12,color:"var(--ink-muted)"}}>
                    {r?"Achieved ✓":`${m.days-streak} day${m.days-streak!==1?"s":""} to go`}
                  </p>
                </div>
                {r&&<span style={{fontSize:22}}>🌟</span>}
              </div>
            );
          })}
        </div>

        <div style={{marginTop:24,padding:"16px",background:"var(--parchment)",borderRadius:14,border:"1.5px solid var(--border)",textAlign:"center"}}>
          <p className="font-display" style={{fontSize:15,fontStyle:"italic",color:"var(--ink-soft)",lineHeight:1.65}}>
            "The most beloved of deeds to Allah are those that are most consistent, even if they are small."
          </p>
          <p style={{fontSize:11,color:"var(--ink-muted)",marginTop:8}}>Sahih al-Bukhari, Hadith 6465</p>
        </div>
      </div>
    </div>
  );
}

// ── ROOT APP ───────────────────────────────────────────────────────────────────
function App() {
  const [habits, setHabits] = useState([]);
  const [loading, setLoading] = useState(true);

  useEffect(() => {
    fetch('/habits.json')
      .then(res => res.json())
      .then(data => {
        setHabits(data);
        setLoading(false);
      })
      .catch(err => {
        console.error('Failed to load habits:', err);
        setLoading(false);
      });
  }, []);

  const [onboarded, setOnboarded] = useState(()=>load("sc_onboarded",false));
  const [tab, setTab] = useState("discover");
  const [routine, setRoutine] = useState(()=>load("sc_routine",[]));
  const [checked, setChecked] = useState(()=>{
    const today=new Date().toDateString();
    const s=load("sc_checked",{date:today,ids:[]});
    return s.date===today?s.ids:[];
  });
  const [streak, setStreak] = useState(()=>load("sc_streak",0));
  const [selected, setSelected] = useState(null);
  const [burstId, setBurstId] = useState(null);

  useEffect(()=>{
    const today=new Date().toDateString();
    const last=load("sc_lastLogin",null);
    if(last!==today){
      const yest=new Date(); yest.setDate(yest.getDate()-1);
      const wasYest=last===yest.toDateString();
      const ns=wasYest?streak+1:(last?0:streak);
      setStreak(ns); save("sc_streak",ns); save("sc_lastLogin",today);
    }
  },[]);

  useEffect(()=>{save("sc_routine",routine);},[routine]);
  useEffect(()=>{save("sc_checked",{date:new Date().toDateString(),ids:checked});},[checked]);
  useEffect(()=>{save("sc_onboarded",onboarded);},[onboarded]);

  const addRemove = useCallback(id=>{
    setRoutine(r=>r.includes(id)?r.filter(x=>x!==id):[...r,id]);
  },[]);

  const toggle = useCallback(id=>{
    setBurstId(id);
    setTimeout(()=>setBurstId(null),700);
    setChecked(c=>c.includes(id)?c.filter(x=>x!==id):[...c,id]);
  },[]);

  const TABS = [
    {id:"discover", icon:"🔍", label:"Discover"},
    {id:"checklist", icon:"☑️", label:"My Routine"},
    {id:"streak",   icon:"🔥", label:`${streak} Day${streak!==1?"s":""}`},
  ];

  if (loading) return (
    <div style={{ flex: 1, display: "flex", alignItems: "center", justifyContent: "center", background: "var(--cream)", height: "100vh" }}>
      <p style={{ fontFamily: "DM Sans, sans-serif", color: "var(--ink-muted)" }}>Loading habits...</p>
    </div>
  );

  if(!onboarded) return <Onboarding onDone={()=>setOnboarded(true)}/>;

  return (
    <>
      <div style={{flex:1,overflow:"hidden",display:"flex",flexDirection:"column"}}>
        {tab==="discover"  && <DiscoverTab routine={routine} onAddRemove={addRemove} onHabitClick={setSelected} habits={habits}/>}
        {tab==="checklist" && <ChecklistTab routine={routine} checked={checked} onToggle={toggle} burst={burstId} onHabitClick={setSelected} habits={habits}/>}
        {tab==="streak"    && <StreakTab streak={streak} routine={routine} checked={checked} habits={habits}/>}
      </div>
      <nav className="tab-bar">
        {TABS.map(t=>(
          <button key={t.id} className={`tab-btn ${tab===t.id?"active":""}`} onClick={()=>setTab(t.id)}>
            <span className="tab-icon">{t.icon}</span>
            {t.label}
          </button>
        ))}
      </nav>
      {selected&&<DetailSheet habit={selected} inRoutine={routine.includes(selected.id)} onAdd={id=>{addRemove(id);}} onClose={()=>setSelected(null)}/>}
    </>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
